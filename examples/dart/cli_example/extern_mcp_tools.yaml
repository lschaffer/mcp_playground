# ── External MCP Tools (Node.js / Python subprocesses) ──────────
# Desktop only — requires Node.js 18+ or Python 3 + uv on PATH.
#
servers:
   - id: filesystem
     name: Filesystem
     url: C:\temp               # args passed to the server
     is_local: true
     local_type: nodejs         # nodejs | python
     local_install_method: npx  # npx | npm | uvx | pip
     local_package: "@modelcontextprotocol/server-filesystem"
     enabled: true
