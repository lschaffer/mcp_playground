name: mcp_playground_flutter
description: "Interactive AI Agent Playground widget for Flutter. Connect to any LLM provider, register Dart-native tools, remote HTTP MCP servers, and local Node.js or Python subprocesses."
version: 0.1.6
homepage: https://github.com/lschaffer/mcp_playground

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ^3.12.0
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  mcp_playground_dart: ^0.1.4
    #path: ../mcp_playground_dart  # local demo mode
  universal_io: ^2.3.1
  http: ^1.6.0
  uuid: ^4.5.3
  shared_preferences: ^2.5.5
  openai_dart: ^7.0.0
  anthropic_sdk_dart: ^6.0.0
  ollama_dart: ^2.4.0
  llamadart: ^0.8.14
  flutter_markdown_plus: ^1.0.12
  file_picker: ^11.0.2
  googleai_dart: ^9.0.0
  url_launcher: ^6.3.2
  path: ^1.9.0
  path_provider: ^2.1.6
  flutter_widget_from_html: ^0.17.2
  archive: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  mcp_playground_dart:
    path: ../mcp_playground_dart

